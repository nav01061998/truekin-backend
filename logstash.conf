# Logstash configuration for TrueKin backend logs

input {
  # Accept logs from our backend application
  http {
    port => 5000
    codec => json
  }

  # Alternative: Read from file if needed
  file {
    path => "./logs/*.log"
    start_position => "beginning"
    codec => json
  }
}

filter {
  # Add timestamp if not present
  if ![timestamp] {
    mutate {
      add_field => { "timestamp" => "%{@timestamp}" }
    }
  }

  # Extract user information from logs
  if [userId] {
    mutate {
      add_field => { "user_id" => "%{userId}" }
    }
  }

  # Add service metadata
  mutate {
    add_field => { "service_name" => "truekin-backend" }
    add_field => { "log_version" => "1.0" }
  }

  # Parse request details
  if [requestId] {
    mutate {
      add_field => { "request_id" => "%{requestId}" }
    }
  }

  # Determine log level for proper severity
  if [level] == "error" {
    mutate {
      add_field => { "severity" => "ERROR" }
    }
  } else if [level] == "warn" {
    mutate {
      add_field => { "severity" => "WARNING" }
    }
  } else if [level] == "info" {
    mutate {
      add_field => { "severity" => "INFO" }
    }
  } else {
    mutate {
      add_field => { "severity" => "DEBUG" }
    }
  }
}

output {
  # Send to Elasticsearch
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    index => "truekin-logs-%{+YYYY.MM.dd}"
    document_type => "_doc"
  }

  # Also log to stdout for debugging (optional)
  stdout {
    codec => rubydebug
  }
}
